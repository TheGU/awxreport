# GoReleaser config — invoked by .github/workflows/release.yml on tag push.
# Local dry-run: `goreleaser release --snapshot --clean`
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: awxreport
    main: ./cmd/awxreport
    binary: awxreport
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is not a target our users have asked for.
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - config.example.yaml

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: TheGU
    name: awxreport
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## awxreport {{ .Tag }}

    Pre-built binaries below. SHA256 checksums are in `SHA256SUMS`.

    ```bash
    # Linux amd64 — replace VERSION with the tag
    curl -L https://github.com/TheGU/awxreport/releases/download/{{ .Tag }}/awxreport_{{ trimprefix .Tag "v" }}_linux_amd64.tar.gz | tar -xz
    ./awxreport version
    ```
