name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # GoReleaser needs the full history to derive a changelog from
          # commit messages since the previous tag.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run tests before release
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When both a prerelease tag and a final tag point at the same
          # commit, do not let GoReleaser guess from git tag ordering.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
